app = 'adgar-processes-assistant'
primary_region = 'ams'

[build]

[env]
  TRANSFORMERS_OFFLINE = "1"
  HF_HUB_OFFLINE = "1"
  SENTENCE_TRANSFORMERS_HOME = "/app/model_cache"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = 'adgar_data'
  destination = '/data'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1024mb'
