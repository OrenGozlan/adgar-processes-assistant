app = "adgar-processes-assistant"
primary_region = "ams"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "adgar_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[services.http_checks]]
  interval = 30000
  grace_period = "10s"
  method = "GET"
  path = "/health"
  protocol = "http"
  timeout = 5000
