<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adgar's Processes Personal Assistant</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f1117;--sidebar:#161b27;--card:#1a1f2e;--border:#2a2f3e;
  --text:#e1e4ea;--text-dim:#8b8fa3;--primary:#6c63ff;--primary-hover:#5a52d9;
  --danger:#ff4757;--success:#2ed573;--input-bg:#1e2333;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
button{cursor:pointer;border:none;font-family:inherit;font-size:inherit}
input,textarea{font-family:inherit;font-size:inherit}

/* Layout */
.app{display:flex;height:100vh}
.sidebar{width:260px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
.main{flex:1;display:flex;flex-direction:column;min-width:0}

/* Sidebar */
.sidebar-header{padding:20px;border-bottom:1px solid var(--border)}
.sidebar-header h2{font-size:14px;font-weight:600;color:var(--primary)}
.sidebar-header p{font-size:11px;color:var(--text-dim);margin-top:4px}
.new-chat-btn{width:100%;padding:10px;margin-top:12px;background:var(--primary);color:#fff;border-radius:8px;font-size:13px;font-weight:500}
.new-chat-btn:hover{background:var(--primary-hover)}

.sessions-list{flex:1;overflow-y:auto;padding:8px}
.session-item{padding:10px 12px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--text-dim);display:flex;justify-content:space-between;align-items:center}
.session-item:hover{background:var(--card)}
.session-item.active{background:var(--card);color:var(--text)}
.session-item .title{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.session-item .delete-btn{opacity:0;background:none;color:var(--danger);font-size:16px;padding:0 4px}
.session-item:hover .delete-btn{opacity:1}

.sidebar-divider{height:1px;background:var(--border);margin:8px 16px}

.docs-section{padding:8px 16px 16px}
.docs-section h3{font-size:12px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.upload-btn{width:100%;padding:8px;background:var(--card);color:var(--text);border:1px dashed var(--border);border-radius:8px;font-size:12px;margin-bottom:8px}
.upload-btn:hover{border-color:var(--primary)}
.doc-item{padding:6px 0;font-size:12px;display:flex;align-items:center;gap:6px;color:var(--text-dim)}
.doc-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.doc-item .toggle{width:32px;height:18px;border-radius:9px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;border:none}
.doc-item .toggle.active{background:var(--success)}
.doc-item .toggle::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .2s}
.doc-item .toggle.active::after{left:16px}
.doc-item .del{background:none;color:var(--danger);font-size:14px;padding:0;opacity:.6}
.doc-item .del:hover{opacity:1}

.sidebar-footer{padding:12px 16px;border-top:1px solid var(--border);font-size:12px;display:flex;align-items:center;justify-content:space-between}
.sidebar-footer .user-info{display:flex;align-items:center;gap:8px}
.role-badge{background:var(--primary);color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;text-transform:uppercase}
.logout-btn{background:none;color:var(--text-dim);font-size:12px;text-decoration:underline}

/* Top bar */
.top-bar{padding:12px 24px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;min-height:48px;align-items:center}
.top-chip{padding:6px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;font-size:12px;color:var(--text-dim);cursor:pointer;white-space:nowrap}
.top-chip:hover{border-color:var(--primary);color:var(--text)}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:24px}
.empty-state .logo{width:180px;opacity:.85}
.empty-state .logo img{width:100%;height:auto}

.message{display:flex;gap:12px;max-width:800px;width:100%}
.message.user{align-self:flex-end;flex-direction:row-reverse}
.message.assistant{align-self:flex-start}
.message.assistant.rtl{flex-direction:row-reverse;align-self:flex-end}
.message.user.rtl{align-self:flex-start}
.message .avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.message.assistant .avatar{background:var(--primary);color:#fff}
.message.user .avatar{background:var(--card);color:var(--text-dim)}
.message .bubble{padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6;max-width:600px;overflow-wrap:break-word}
.message.assistant .bubble{background:var(--card);border:1px solid var(--border)}
.message.user .bubble{background:var(--primary);color:#fff}
.message .bubble p{margin-bottom:8px}
.message .bubble p:last-child{margin-bottom:0}
.message .bubble code{background:rgba(255,255,255,.1);padding:2px 6px;border-radius:4px;font-size:13px}
.message .bubble pre{background:rgba(0,0,0,.3);padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.message .bubble pre code{background:none;padding:0}
.message .bubble ul,.message .bubble ol{padding-left:20px;margin-bottom:8px}
.message .bubble[dir="rtl"] ul,.message .bubble[dir="rtl"] ol{padding-left:0;padding-right:20px}
.followup-wrap{display:flex;gap:12px;max-width:800px;width:100%;align-self:flex-start}
.followup-wrap.rtl{flex-direction:row-reverse;align-self:flex-end}
.followup-spacer{width:32px;flex-shrink:0}
.followup-bubble{background:linear-gradient(135deg,rgba(108,99,255,.12),rgba(108,99,255,.06));border:1px solid rgba(108,99,255,.3);border-radius:12px;padding:12px 16px;font-size:13px;color:var(--text);cursor:pointer;max-width:600px;transition:all .2s;line-height:1.5}
.followup-bubble:hover{background:linear-gradient(135deg,rgba(108,99,255,.2),rgba(108,99,255,.1));border-color:var(--primary);transform:translateY(-1px)}
.followup-bubble::before{content:'💬 ';font-size:14px}

.tip-card{max-width:480px;width:100%;margin:0 auto;text-align:center;padding:28px 32px;background:linear-gradient(135deg,#1e1b4b,#312e81,#1e3a5f);border:1px solid rgba(79,70,229,.4);border-radius:20px;box-shadow:0 4px 24px rgba(99,102,241,.1)}
.tip-card .icon{font-size:32px;margin-bottom:10px}
.tip-card .label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:#a5b4fc;margin-bottom:10px;font-weight:600}
.tip-card .text{font-size:15px;line-height:1.7;color:#e0e7ff;min-height:44px}
.tip-card .tip-actions{margin-top:16px;display:flex;gap:10px;justify-content:center}
.tip-card .next-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#c7d2fe;padding:7px 18px;border-radius:10px;font-size:12px;cursor:pointer;transition:all .2s}
.tip-card .next-btn:hover{background:rgba(255,255,255,.18);color:#fff}
.tip-card .close-btn{background:none;border:none;color:#818cf8;padding:7px 14px;border-radius:10px;font-size:12px;cursor:pointer;transition:all .2s}
.tip-card .close-btn:hover{color:#c7d2fe}
.warmup-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:20px;font-size:12px;color:#f59e0b;margin-bottom:16px}
.warmup-badge .dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:pulse 1.4s infinite}

.searching-indicator{display:flex;align-items:center;gap:8px;color:var(--text-dim);font-size:13px;padding:8px 0}
.searching-indicator .dot{width:6px;height:6px;border-radius:50%;background:var(--primary);animation:pulse 1.4s infinite}
.searching-indicator .dot:nth-child(2){animation-delay:.2s}
.searching-indicator .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{opacity:.3}40%{opacity:1}}

/* Input area */
.input-area{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:12px;align-items:flex-end}
.input-area textarea{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:12px 16px;color:var(--text);font-size:14px;resize:none;max-height:120px;outline:none}
.input-area textarea:focus{border-color:var(--primary)}
.send-btn{width:44px;height:44px;background:var(--primary);border-radius:12px;color:#fff;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.send-btn:hover{background:var(--primary-hover)}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
.lang-select{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;cursor:pointer;flex-shrink:0}
.lang-select:focus{border-color:var(--primary)}

/* Auth screens */
.auth-overlay{position:fixed;inset:0;background:linear-gradient(135deg,#0f1117 0%,#1a1040 50%,#0f1117 100%);display:flex;align-items:center;justify-content:center;z-index:100}
.auth-card{background:rgba(26,31,46,.85);backdrop-filter:blur(20px);border:1px solid rgba(99,102,241,.2);border-radius:24px;padding:48px 40px;width:400px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 80px rgba(99,102,241,.08)}
.auth-logo{text-align:center;font-size:48px;margin-bottom:16px}
.auth-card h2{text-align:center;margin-bottom:6px;font-size:22px;font-weight:700;letter-spacing:-.3px}
.auth-card .subtitle{text-align:center;color:var(--text-dim);font-size:13px;margin-bottom:32px}
.input-group{position:relative;margin-bottom:14px}
.input-group .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none}
.auth-card input,.auth-card select{width:100%;padding:13px 14px 13px 42px;background:rgba(30,35,51,.8);border:1px solid var(--border);border-radius:12px;color:var(--text);outline:none;font-size:14px;transition:border-color .2s,box-shadow .2s}
.auth-card input:focus,.auth-card select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(108,99,255,.15)}
.auth-card input::placeholder{color:var(--text-dim);opacity:.6}
.auth-card .auth-btn{width:100%;padding:14px;background:linear-gradient(135deg,#6c63ff,#4f46e5);color:#fff;border-radius:12px;font-size:15px;font-weight:600;margin-top:8px;transition:transform .15s,box-shadow .2s;letter-spacing:.3px}
.auth-card .auth-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(108,99,255,.35)}
.auth-card .auth-btn:active{transform:translateY(0)}
.auth-card .auth-btn:disabled{opacity:.5;transform:none;box-shadow:none}
.auth-divider{text-align:center;margin:20px 0 4px;position:relative}
.auth-divider::before{content:'';position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border)}
.auth-divider span{background:rgba(26,31,46,.85);padding:0 16px;position:relative;color:var(--text-dim);font-size:12px}
.auth-card .toggle-link{text-align:center;margin-top:12px;font-size:13px;color:var(--text-dim)}
.auth-card .toggle-link a{color:#a5b4fc;cursor:pointer;text-decoration:none;font-weight:500}
.auth-card .toggle-link a:hover{color:#c7d2fe}
.auth-card .error{color:var(--danger);font-size:12px;margin-top:8px;text-align:center;padding:8px;background:rgba(255,71,87,.1);border-radius:8px}

/* Upload modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px;width:440px;max-width:90vw}
.modal h3{margin-bottom:16px;font-size:16px}
.drop-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;color:var(--text-dim);font-size:13px;cursor:pointer;transition:border-color .2s}
.drop-zone.dragover{border-color:var(--primary)}
.drop-zone input{display:none}
.progress-bar{height:4px;background:var(--border);border-radius:2px;margin-top:16px;overflow:hidden;display:none}
.progress-bar .fill{height:100%;background:var(--primary);width:0;transition:width .3s}
.upload-status{margin-top:12px;font-size:13px;text-align:center}
.modal .close-btn{margin-top:16px;width:100%;padding:10px;background:var(--border);color:var(--text);border-radius:8px;font-size:13px}

/* Mobile */
.hamburger{display:none;position:fixed;top:12px;left:12px;z-index:50;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:18px}
.sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:30}
@media(max-width:768px){
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:40;transform:translateX(-100%)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-backdrop.open{display:block}
  .hamburger{display:block}
  .main{margin-left:0}
}

/* Skeleton */
.skeleton{background:linear-gradient(90deg,var(--card) 25%,var(--border) 50%,var(--card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px;height:16px;margin:8px 0}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
</style>
</head>
<body>

<!-- Auth -->
<div id="authOverlay" class="auth-overlay">
  <div class="auth-card">
    <div class="auth-logo">📋</div>
    <h2 id="authTitle">Welcome Back</h2>
    <p class="subtitle">Adgar's Processes Assistant</p>
    <div id="authForm">
      <div class="input-group">
        <span class="input-icon">✉</span>
        <input type="email" id="authEmail" placeholder="you@adgar.com">
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input type="password" id="authPassword" placeholder="Password">
      </div>
      <div id="registerFields" style="display:none">
        <div class="input-group">
          <span class="input-icon">👤</span>
          <select id="authRole">
            <option value="employee">Employee</option>
            <option value="admin">Admin</option>
          </select>
        </div>
        <div id="adminCodeField" style="display:none">
          <div class="input-group">
            <span class="input-icon">🔑</span>
            <input type="password" id="authAdminCode" placeholder="Admin code">
          </div>
        </div>
      </div>
      <div id="authError" class="error" style="display:none"></div>
      <button class="auth-btn" id="authSubmit">Sign In</button>
      <div class="auth-divider"><span>or</span></div>
      <div class="toggle-link">
        <span id="authToggleText">Don't have an account? </span>
        <a id="authToggle">Register</a>
      </div>
    </div>
  </div>
</div>

<!-- Upload Modal -->
<div id="uploadModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Upload Document</h3>
    <div class="drop-zone" id="dropZone">
      <p>Drag & drop a file here, or click to browse</p>
      <p style="margin-top:8px;font-size:11px">Supported: PDF, DOCX, TXT</p>
      <input type="file" id="fileInput" accept=".pdf,.docx,.txt">
    </div>
    <div class="progress-bar" id="progressBar"><div class="fill" id="progressFill"></div></div>
    <div class="upload-status" id="uploadStatus"></div>
    <button class="close-btn" id="closeModal">Close</button>
  </div>
</div>

<!-- Mobile -->
<button class="hamburger" id="hamburger">&#9776;</button>
<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

<!-- App -->
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>Adgar's Processes</h2>
      <p>Personal Assistant</p>
      <button class="new-chat-btn" id="newChatBtn">+ New Chat</button>
    </div>
    <div class="sessions-list" id="sessionsList"></div>
    <div class="sidebar-divider"></div>
    <div class="docs-section" id="docsSection" style="display:none">
      <h3>Documents</h3>
      <button class="upload-btn" id="uploadBtn">+ Upload Document</button>
      <div id="docsList"></div>
    </div>
    <div class="sidebar-footer">
      <div class="user-info">
        <span id="userEmail">-</span>
        <span class="role-badge" id="userRole">-</span>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </aside>
  <div class="main">
    <div class="top-bar" id="topBar"></div>
    <div class="chat-area" id="chatArea">
      <div class="empty-state" id="emptyState">
        <div class="logo"><img src="/static/adgar-logo.webp" alt="Adgar"></div>
      </div>
    </div>
    <div class="input-area">
      <select id="langSelect" class="lang-select">
        <option value="en">EN</option>
        <option value="he">HE</option>
        <option value="pl">PL</option>
      </select>
      <textarea id="chatInput" rows="1" placeholder="Ask a question..." disabled></textarea>
      <button class="send-btn" id="sendBtn" disabled>&#10148;</button>
    </div>
  </div>
</div>

<script>
const API = '';
let token = sessionStorage.getItem('token');
let currentUser = null;
let currentSessionId = null;
let isStreaming = false;
let isLogin = true;

const $ = id => document.getElementById(id);

// --- Auth ---
function showAuth(show) {
  $('authOverlay').style.display = show ? 'flex' : 'none';
}

$('authToggle').onclick = () => {
  isLogin = !isLogin;
  $('authTitle').textContent = isLogin ? 'Welcome Back' : 'Create Account';
  $('authSubmit').textContent = isLogin ? 'Sign In' : 'Create Account';
  $('authToggleText').textContent = isLogin ? "Don't have an account? " : "Already have an account? ";
  $('authToggle').textContent = isLogin ? 'Register' : 'Sign In';
  $('registerFields').style.display = isLogin ? 'none' : 'block';
  $('authError').style.display = 'none';
};

$('authRole').onchange = () => {
  $('adminCodeField').style.display = $('authRole').value === 'admin' ? 'block' : 'none';
};

$('authSubmit').onclick = async () => {
  const email = $('authEmail').value.trim();
  const password = $('authPassword').value;
  if (!email || !password) return showError('Please fill in all fields');

  const url = isLogin ? '/api/auth/login' : '/api/auth/register';
  const body = { email, password };
  if (!isLogin) {
    body.role = $('authRole').value;
    if (body.role === 'admin') body.admin_code = $('authAdminCode').value;
  }

  $('authSubmit').disabled = true;
  $('authSubmit').textContent = 'Please wait...';
  $('authError').style.display = 'none';

  try {
    const res = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Auth failed');
    token = data.token;
    sessionStorage.setItem('token', token);
    currentUser = { id: data.id, email: data.email, role: data.role };
    enterApp();
  } catch (e) { showError(e.message); } finally {
    $('authSubmit').disabled = false;
    $('authSubmit').textContent = isLogin ? 'Sign In' : 'Register';
  }
};

function showError(msg) {
  $('authError').textContent = msg;
  $('authError').style.display = 'block';
}

// --- API helpers ---
function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }

async function apiFetch(url, opts = {}) {
  opts.headers = { ...authHeaders(), ...opts.headers };
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 30000);
  try {
    const res = await fetch(url, { ...opts, signal: controller.signal });
    if (res.status === 401) { logout(); throw new Error('Session expired'); }
    return res;
  } finally { clearTimeout(timeout); }
}

function logout() {
  token = null;
  currentUser = null;
  currentSessionId = null;
  sessionStorage.removeItem('token');
  $('sessionsList').innerHTML = '';
  $('docsList').innerHTML = '';
  $('docsSection').style.display = 'none';
  showEmpty();
  showAuth(true);
}

$('logoutBtn').onclick = logout;

// --- Init ---
async function initApp() {
  try {
    const res = await apiFetch('/api/auth/me');
    if (!res.ok) throw new Error();
    currentUser = await res.json();
  } catch { return logout(); }
  enterApp();
}

const TIPS = [
  "💡 Take a 5-minute break every hour — it actually boosts your focus and productivity.",
  "💡 Turn off your monitor when you leave your desk — small habit, real energy savings.",
  "💡 Block 30 minutes of 'deep work' on your calendar each morning before meetings take over.",
  "💡 Use the 2-minute rule: if a task takes less than 2 minutes, do it now instead of adding it to your list.",
  "💡 Unplug chargers and devices at the end of the day — phantom power adds up.",
  "💡 Set your phone to Do Not Disturb during focus time — notifications can wait.",
  "💡 Bring a reusable water bottle — staying hydrated keeps your energy up all day.",
  "💡 End your workday at a fixed time — boundaries make you more productive, not less.",
  "💡 Use natural light when possible — it saves energy and improves your mood.",
  "💡 Take the stairs when you can — quick energy boost between meetings.",
  "💡 Keep your desk clean — a clear workspace means a clear mind.",
  "💡 Batch similar tasks together — context switching is the silent productivity killer.",
  "💡 Set your AC to 24°C — comfortable and energy-efficient.",
  "💡 Take a walk outside during lunch — sunlight and movement recharge you for the afternoon.",
  "💡 Review your to-do list at the end of the day so tomorrow morning you can hit the ground running.",
];

let _tipIndex = 0;
let _modelReady = false;
let _tipEl = null;

function _shuffleTips() {
  for (let i = TIPS.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [TIPS[i], TIPS[j]] = [TIPS[j], TIPS[i]];
  }
}

function _nextTip() {
  _tipIndex = (_tipIndex + 1) % TIPS.length;
  if (_tipEl) _tipEl.querySelector('.text').textContent = TIPS[_tipIndex];
}

function showTipInChat() {
  _shuffleTips();
  _tipIndex = 0;
  const empty = $('emptyState');
  if (!empty) return;

  _tipEl = document.createElement('div');
  _tipEl.className = 'tip-card';
  _tipEl.id = 'tipCard';
  _tipEl.innerHTML = `
    <div class="icon">✨</div>
    <div class="label">Tip of the Day</div>
    <div class="text">${TIPS[0]}</div>
    <div class="tip-actions">
      <button class="next-btn">Next tip →</button>
      <button class="close-btn">Dismiss</button>
    </div>
  `;
  _tipEl.querySelector('.next-btn').onclick = _nextTip;
  _tipEl.querySelector('.close-btn').onclick = () => { _tipEl.remove(); _tipEl = null; };
  empty.appendChild(_tipEl);
}

function showWarmupBadge() {
  const empty = $('emptyState');
  if (!empty) return;
  const badge = document.createElement('div');
  badge.className = 'warmup-badge';
  badge.id = 'warmupBadge';
  badge.innerHTML = '<span class="dot"></span> System warming up...';
  empty.insertBefore(badge, empty.firstChild);
}

function hideWarmupBadge() {
  const badge = $('warmupBadge');
  if (badge) badge.remove();
}

async function waitForWarmup() {
  try {
    const res = await fetch('/health');
    const data = await res.json();
    if (data.model_ready) { _modelReady = true; return; }
  } catch {}
  showWarmupBadge();
  while (true) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const res = await fetch('/health');
      const data = await res.json();
      if (data.model_ready) { _modelReady = true; hideWarmupBadge(); return; }
    } catch {}
  }
}

function enterApp() {
  showAuth(false);
  $('userEmail').textContent = currentUser.email;
  $('userRole').textContent = currentUser.role;
  $('chatInput').disabled = false;
  $('sendBtn').disabled = false;

  showTipInChat();

  const tasks = [loadSessions(), loadTopQuestions(), waitForWarmup()];
  if (currentUser.role === 'admin') {
    $('docsSection').style.display = 'block';
    tasks.push(loadDocuments());
  }
  Promise.all(tasks);
}

// --- Sessions ---
async function loadSessions() {
  $('sessionsList').innerHTML = '<div class="skeleton"></div><div class="skeleton" style="width:80%"></div><div class="skeleton" style="width:60%"></div>';
  try {
    const res = await apiFetch('/api/chat/sessions');
    const sessions = await res.json();
    $('sessionsList').innerHTML = '';
    sessions.forEach(s => {
      const div = document.createElement('div');
      div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
      div.innerHTML = `<span class="title">${esc(s.title)}</span><button class="delete-btn" title="Delete">&times;</button>`;
      div.querySelector('.title').onclick = () => loadSession(s.id);
      div.querySelector('.delete-btn').onclick = async (e) => {
        e.stopPropagation();
        await apiFetch(`/api/chat/sessions/${s.id}`, { method: 'DELETE' });
        if (currentSessionId === s.id) { currentSessionId = null; showEmpty(); }
        loadSessions();
      };
      $('sessionsList').appendChild(div);
    });
  } catch {}
}

async function loadSession(id) {
  currentSessionId = id;
  const res = await apiFetch(`/api/chat/sessions/${id}/messages`);
  const messages = await res.json();
  $('chatArea').innerHTML = '';
  messages.forEach(m => appendMessage(m.role, m.content));
  scrollBottom();
  loadSessions();
}

$('newChatBtn').onclick = () => { currentSessionId = null; showEmpty(); loadSessions(); };

function showEmpty() {
  $('chatArea').innerHTML = '<div class="empty-state" id="emptyState"><div class="logo"><img src="/static/adgar-logo.webp" alt="Adgar"></div></div>';
  showTipInChat();
}

// --- Top Questions ---
async function loadTopQuestions() {
  try {
    const res = await fetch('/api/chat/top-questions');
    const questions = await res.json();
    $('topBar').innerHTML = '';
    if (questions.length === 0) {
      $('topBar').innerHTML = '<span style="color:var(--text-dim);font-size:12px">Top questions will appear here</span>';
      return;
    }
    questions.forEach(q => {
      const chip = document.createElement('button');
      chip.className = 'top-chip';
      chip.textContent = q.question;
      chip.onclick = () => { $('chatInput').value = q.question; sendMessage(); };
      $('topBar').appendChild(chip);
    });
  } catch {}
}

// --- Chat ---
function detectDir(text) {
  const rtlRe = /[\u0590-\u05FF\u0600-\u06FF\u0700-\u074F]/;
  return rtlRe.test(text.slice(0, 100)) ? 'rtl' : 'ltr';
}

function appendMessage(role, content) {
  const div = document.createElement('div');
  const dir = detectDir(content);
  const isRtl = dir === 'rtl';
  div.className = `message ${role}${isRtl ? ' rtl' : ''}`;
  const avatar = role === 'assistant' ? '🤖' : '👤';
  div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble"></div>`;
  const bubble = div.querySelector('.bubble');
  bubble.setAttribute('dir', dir);
  bubble.style.textAlign = isRtl ? 'right' : 'left';
  if (role === 'assistant') {
    bubble.innerHTML = marked.parse(content);
  } else {
    bubble.textContent = content;
  }
  $('chatArea').appendChild(div);
  return div;
}

function scrollBottom() {
  const area = $('chatArea');
  area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
  const text = $('chatInput').value.trim();
  if (!text || isStreaming) return;

  const empty = $('emptyState');
  if (empty) empty.remove();

  appendMessage('user', text);
  $('chatInput').value = '';
  $('chatInput').style.height = 'auto';
  scrollBottom();

  const indicator = document.createElement('div');
  indicator.className = 'searching-indicator';
  indicator.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div><span>Searching documents...</span>';
  $('chatArea').appendChild(indicator);
  scrollBottom();

  isStreaming = true;
  $('sendBtn').disabled = true;

  try {
    const reqBody = JSON.stringify({ session_id: currentSessionId, message: text, language: $('langSelect').value });
    const res = await fetch('/api/chat/message', {
      method: 'POST',
      headers: authHeaders(),
      body: reqBody,
    });

    if (!res.ok) {
      let msg = 'Failed to send message';
      try { const err = await res.json(); msg = err.detail || msg; } catch {}
      throw new Error(msg);
    }

    indicator.remove();

    const msgDiv = appendMessage('assistant', '');
    const bubble = msgDiv.querySelector('.bubble');
    let fullText = '';
    let dirDetected = false;

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });

      const lines = buffer.split('\n');
      buffer = lines.pop();

      let streamDone = false;
      for (const line of lines) {
        if (streamDone && line.startsWith('data: ')) {
          currentSessionId = parseInt(line.slice(6));
          continue;
        }
        if (line.startsWith('event: done')) {
          streamDone = true;
          continue;
        }
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          fullText += data;
          if (!dirDetected && fullText.length > 5) {
            const dir = detectDir(fullText);
            bubble.setAttribute('dir', dir);
            bubble.style.textAlign = dir === 'rtl' ? 'right' : 'left';
            if (dir === 'rtl') msgDiv.classList.add('rtl');
            dirDetected = true;
          }
          const separatorIdx = fullText.indexOf('\n---\n');
          if (separatorIdx === -1) {
            bubble.innerHTML = marked.parse(fullText);
          } else {
            bubble.innerHTML = marked.parse(fullText.slice(0, separatorIdx));
          }
          scrollBottom();
        }
      }
    }

    const sepIdx = fullText.indexOf('\n---\n');
    if (sepIdx !== -1) {
      const mainText = fullText.slice(0, sepIdx);
      const followUp = fullText.slice(sepIdx + 5).trim();
      bubble.innerHTML = marked.parse(mainText);
      if (followUp) {
        const dir = detectDir(followUp);
        const wrap = document.createElement('div');
        wrap.className = 'followup-wrap' + (dir === 'rtl' ? ' rtl' : '');
        wrap.innerHTML = '<div class="followup-spacer"></div><div class="followup-bubble"></div>';
        const fuBubble = wrap.querySelector('.followup-bubble');
        fuBubble.setAttribute('dir', dir);
        fuBubble.style.textAlign = dir === 'rtl' ? 'right' : 'left';
        fuBubble.textContent = followUp;
        fuBubble.onclick = () => { $('chatInput').value = followUp; sendMessage(); };
        $('chatArea').appendChild(wrap);
      }
    }

    loadSessions();
    loadTopQuestions();
  } catch (e) {
    indicator.remove();
    appendMessage('assistant', `Error: ${e.message}`);
  }

  isStreaming = false;
  $('sendBtn').disabled = false;
  scrollBottom();
}

$('sendBtn').onclick = sendMessage;
$('langSelect').onchange = function() {
  const dir = this.value === 'he' ? 'rtl' : 'ltr';
  $('chatInput').setAttribute('dir', dir);
  $('chatInput').style.textAlign = dir === 'rtl' ? 'right' : 'left';
};
$('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
$('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// --- Documents ---
let _docPollTimer = null;
async function loadDocuments() {
  try {
    const res = await apiFetch('/api/admin/documents');
    const docs = await res.json();
    $('docsList').innerHTML = '';
    let hasProcessing = false;
    docs.forEach(d => {
      const div = document.createElement('div');
      div.className = 'doc-item';
      const isProcessing = d.status === 'processing';
      const isError = d.status === 'error';
      if (isProcessing) hasProcessing = true;
      const statusBadge = isProcessing
        ? '<span style="font-size:10px;color:#f0a030;white-space:nowrap">Processing...</span>'
        : isError
        ? '<span style="font-size:10px;color:var(--danger)">Error</span>'
        : `<span style="font-size:10px;color:var(--text-dim)">${d.chunk_count}ch</span>`;
      div.innerHTML = `
        <span class="name" title="${esc(d.filename)}">${esc(d.filename)}</span>
        ${statusBadge}
        <button class="toggle ${d.active ? 'active' : ''}" title="Toggle active" ${isProcessing ? 'disabled' : ''}></button>
        <button class="del" title="Delete">&times;</button>
      `;
      div.querySelector('.toggle').onclick = async () => {
        await apiFetch(`/api/admin/documents/${d.id}/toggle`, { method: 'PATCH' });
        loadDocuments();
      };
      div.querySelector('.del').onclick = async () => {
        await apiFetch(`/api/admin/documents/${d.id}`, { method: 'DELETE' });
        loadDocuments();
      };
      $('docsList').appendChild(div);
    });
    if (_docPollTimer) { clearInterval(_docPollTimer); _docPollTimer = null; }
    if (hasProcessing) { _docPollTimer = setInterval(loadDocuments, 5000); }
  } catch {}
}

// --- Upload ---
$('uploadBtn').onclick = () => { $('uploadModal').style.display = 'flex'; $('uploadStatus').textContent = ''; $('progressBar').style.display = 'none'; };
$('closeModal').onclick = () => { $('uploadModal').style.display = 'none'; };

const dropZone = $('dropZone');
dropZone.onclick = () => $('fileInput').click();
dropZone.ondragover = e => { e.preventDefault(); dropZone.classList.add('dragover'); };
dropZone.ondragleave = () => dropZone.classList.remove('dragover');
dropZone.ondrop = e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]); };
$('fileInput').onchange = e => { if (e.target.files.length) uploadFile(e.target.files[0]); };

async function uploadFile(file) {
  const formData = new FormData();
  formData.append('file', file);

  $('progressBar').style.display = 'block';
  $('progressFill').style.width = '30%';
  $('uploadStatus').textContent = `Uploading ${file.name}...`;
  $('uploadStatus').style.color = 'var(--text-dim)';

  try {
    $('progressFill').style.width = '60%';
    const res = await fetch('/api/admin/documents/upload', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${token}` },
      body: formData,
    });
    $('progressFill').style.width = '100%';

    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    $('uploadStatus').textContent = `Uploaded! Document is being processed in the background.`;
    $('uploadStatus').style.color = 'var(--success)';
    loadDocuments();
  } catch (e) {
    $('uploadStatus').textContent = `Error: ${e.message}`;
    $('uploadStatus').style.color = 'var(--danger)';
    $('progressFill').style.width = '0';
  }
}

// --- Mobile ---
$('hamburger').onclick = () => { $('sidebar').classList.toggle('open'); $('sidebarBackdrop').classList.toggle('open'); };
$('sidebarBackdrop').onclick = () => { $('sidebar').classList.remove('open'); $('sidebarBackdrop').classList.remove('open'); };

// --- Util ---
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// --- Boot ---
if (token) { initApp(); } else { showAuth(true); }
</script>
